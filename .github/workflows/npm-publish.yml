name: Build Check
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Создаем .env файл
      - name: Create .env file
        run: |
          echo "REACT_APP_API_BASE_URL=http://localhost:0000" >> .env
          echo "REACT_APP_API_SCHEDULER_URL=http://localhost:0000" >> .env
      
      - run: npm ci
      - run: npm install @babel/plugin-proposal-private-property-in-object --save-dev
      - run: npm run build:prod
